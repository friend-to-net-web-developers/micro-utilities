name: Bug Report
description: Something isn't working as documented
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please check existing issues before submitting.

  - type: input
    id: version
    attributes:
      label: Library version
      placeholder: "e.g. 2.0.0"
    validations:
      required: true

  - type: input
    id: dotnet
    attributes:
      label: .NET version
      placeholder: "e.g. .NET 10"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: The smallest code sample that demonstrates the issue.
      render: csharp
    validations:
      required: true